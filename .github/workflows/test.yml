name: Tests

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get install -y libcurl4-openssl-dev
      - name: Build
        run: |
          cmake -B build
          cmake --build build
      - name: Run tests
        run: ./build/tests/tests